spring:
  application:
    name: data-agent-backend
  datasource:
    # product_db：作为 Step7 的真实 SQL 数据源（先单库从简，后续再做按 agentId 动态数据源）
    url: "${PRODUCT_DB_URL:jdbc:mysql://127.0.0.1:3306/product_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}"
    username: "${PRODUCT_DB_USERNAME:root}"
    password: "${PRODUCT_DB_PASSWORD:admin}"
    driver-class-name: com.mysql.cj.jdbc.Driver

search:
  lite:
    orchestrator:
      # pipeline|graph
      mode: graph
    context:
      max-turn-history: 5
      max-field-length: 240
    graph:
      sql-retry:
        max-attempts: 1
    recall:
      # keyword|vector|hybrid
      provider: hybrid
      weight:
        schema-table: 1.15
        schema-column: 1.05
        evidence: 0.95
        document: 0.9
        exact-match-bonus: 0.15
      store:
        dir: D:\GitHub\DataAgent\data-agent-backend\data\recall
      vector:
        top-k: 5
        weight: 0.7
        embedding:
          base-url: "${RECALL_EMBEDDING_BASE_URL:http://localhost:11434}"
          api-key: "${RECALL_EMBEDDING_API_KEY:}"
          model: "${RECALL_EMBEDDING_MODEL:bge-m3}"
          path: "${RECALL_EMBEDDING_PATH:/v1/embeddings}"
    intent:
      # mock|minimax
      provider: minimax
    evidence:
      # file|mock
      provider: file
      top-k: 5
      rewrite:
        # none|minimax
        provider: minimax
    document:
      dir: D:\GitHub\DataAgent\data-agent-backend\data\documents
      top-k: 3
      chunk:
        max-chars: 400
    schema:
      # 先固定 product_db 的 demo 表；后续会升级为按 agentId 的动态表选择/向量召回
      tables: users,products,orders,order_items,categories,product_categories
      recall:
        top-k: 3
    enhance:
      # mock|minimax
      provider: minimax
    sql:
      generate:
        # minimax|mock
        provider: minimax
        limit: 200
      execute:
        # mock|jdbc
        provider: jdbc
        limit: 200
        timeout-seconds: 5
    result:
      # mock|minimax
      provider: minimax
      max-rows-for-prompt: 20

llm:
  anthropic:
    base-url: https://api.minimaxi.com/anthropic
    # 推荐用环境变量注入，不要把 key 写进仓库
    # export LLM_ANTHROPIC_API_KEY=...
    api-key: "${LLM_ANTHROPIC_API_KEY:}"
    model: MiniMax-M2.7
    temperature: 0.5
    max-tokens: 8192
    anthropic-version: ""

logging:
  level:
    # 默认用 INFO，想看更细的调试日志可以：设置 APP_LOG_LEVEL=DEBUG
    com.alibaba.cloud.ai.dataagentbackend: "${APP_LOG_LEVEL:INFO}"
