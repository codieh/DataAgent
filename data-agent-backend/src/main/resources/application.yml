spring:
  application:
    name: data-agent-backend
  datasource:
    # product_db：作为 Step7 的真实 SQL 数据源（先单库从简，后续再做按 agentId 动态数据源）
    url: "${PRODUCT_DB_URL:jdbc:mysql://127.0.0.1:3306/product_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}"
    username: "${PRODUCT_DB_USERNAME:root}"
    password: "${PRODUCT_DB_PASSWORD:admin}"
    driver-class-name: com.mysql.cj.jdbc.Driver

search:
  lite:
    intent:
      # mock|minimax
      provider: minimax
    evidence:
      # file|mock
      provider: file
      top-k: 5

llm:
  anthropic:
    base-url: https://api.minimaxi.com/anthropic
    # 推荐用环境变量注入，不要把 key 写进仓库
    # export LLM_ANTHROPIC_API_KEY=...
    api-key: "${LLM_ANTHROPIC_API_KEY:}"
    model: MiniMax-M2.7
    temperature: 0.5
    max-tokens: 8192
    anthropic-version: ""

logging:
  level:
    # 默认用 INFO，想看更细的调试日志可以：设置 APP_LOG_LEVEL=DEBUG
    com.alibaba.cloud.ai.dataagentbackend: "${APP_LOG_LEVEL:INFO}"
